---
name: ansible-ci

on:
  push:
  pull_request:

env:
  ANSIBLE_LOCAL_TEMP: .ansible/tmp
  ANSIBLE_REMOTE_TEMP: .ansible/tmp
  PY_COLORS: "1"

jobs:
  lint-and-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Prepare Ansible local temp
        run: mkdir -p .ansible/tmp

      - name: Fleet renderer contract tests
        run: python .github/scripts/test-render-fleet-runtime.py

      - name: Syntax check
        run: ansible-playbook -i hosts.example.ini playbook.yml --syntax-check

      - name: ansible-lint
        run: ansible-lint playbook.yml roles

      - name: yamllint
        run: yamllint .

  molecule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Prepare Ansible local temp
        run: mkdir -p .ansible/tmp

      - name: Run Molecule
        run: molecule test -s default
