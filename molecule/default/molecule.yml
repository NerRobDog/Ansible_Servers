---
dependency:
  name: shell
  command: echo "Dependency installation is handled before Molecule run."

driver:
  name: docker

platforms:
  - name: debian12
    image: docker.io/python:3.12-slim
    pre_build_image: true
    command: /bin/sh -c "while true; do sleep 3600; done"

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/roles
    ANSIBLE_COLLECTIONS_PATH: ${MOLECULE_PROJECT_DIRECTORY}/.ansible/collections:/Users/nik/.ansible/collections:/usr/share/ansible/collections
    ANSIBLE_COLLECTIONS_PATHS: ${MOLECULE_PROJECT_DIRECTORY}/.ansible/collections:/Users/nik/.ansible/collections:/usr/share/ansible/collections
  inventory:
    host_vars:
      debian12:
        ansible_python_interpreter: /usr/local/bin/python3
  playbooks:
    converge: converge.yml

scenario:
  name: default
  check_sequence:
    - dependency
    - create
    - converge
    - check
    - destroy
  test_sequence:
    - dependency
    - create
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: ansible
