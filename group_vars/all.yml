---
# User profile is disabled by default and can be enabled per-host in host_vars.
create_user: false
configure_root_zsh: true

# User defaults
new_user: ""
new_user_comment: ""
new_user_home: ""
new_user_groups:
  - wheel
  - docker
new_user_password_hash: null
new_user_authorized_keys: []
new_user_authorized_keys_exclusive: true
new_user_passwordless_sudo: false
new_user_shell: /bin/bash

# Zsh / OMZ defaults
zsh_theme: afowler
omz_plugins:
  - git
  - history
  - zsh-autosuggestions
  - zsh-syntax-highlighting
  - dirhistory
  - web-search
  - docker
  - extract
  - docker-compose
  - z
  - fzf
  - colored-man-pages
  - aliases
  - ansible
zsh_custom_plugins:
  - name: zsh-autosuggestions
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    version: master
  - name: zsh-syntax-highlighting
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    version: master
enable_thefuck: false

# Package defaults
base_packages:
  - git
  - curl
  - wget
  - nano
  - zsh
  - fzf
  - unzip
  - python3
  - python3-pip
  - rsync
  - sshpass
  - ansible-core
  - htop
  - net-tools
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
pipx_packages: []
