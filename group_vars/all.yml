---
# User profile is disabled by default and can be enabled per-host in host_vars.
create_user: false
configure_root_zsh: true

# User defaults
new_user: ""
new_user_comment: ""
new_user_home: ""
new_user_groups:
  - wheel
  - docker
new_user_password_hash: null
new_user_authorized_keys: []
new_user_authorized_keys_exclusive: true
new_user_passwordless_sudo: false
new_user_shell: /bin/bash

# Zsh / OMZ defaults
zsh_theme: afowler
omz_plugins:
  - git
  - history
  - zsh-autosuggestions
  - zsh-syntax-highlighting
  - dirhistory
  - web-search
  - docker
  - extract
  - docker-compose
  - z
  - fzf
  - colored-man-pages
  - aliases
  - ansible
zsh_custom_plugins:
  - name: zsh-autosuggestions
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    version: master
  - name: zsh-syntax-highlighting
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    version: master
enable_thefuck: false

# Package defaults
base_packages:
  - git
  - curl
  - wget
  - nano
  - zsh
  - fzf
  - unzip
  - python3
  - python3-pip
  - rsync
  - sshpass
  - ansible-core
  - htop
  - net-tools
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
pipx_packages: []

# RemaWave node defaults (safe global defaults)
remnawave_node_enabled: false
remnawave_node_image: remnawave/node:latest
remnawave_node_port: 3001
remnawave_node_secret_key: ""
remnawave_node_install_path: /opt/remnanode
remnawave_node_log_dir: /var/log/remnanode
remnawave_node_network_mode: host
remnawave_node_cap_add:
  - NET_ADMIN
remnawave_node_manage_runtime: true

remnawave_api_enabled: true
remnawave_api_endpoint_template: ""
remnawave_fallback_json_env: RW_NODE_FALLBACK_JSON
remnawave_runtime_host_vars: {}

remnawave_caddy_enabled: true
remnawave_caddy_domain: ""
remnawave_caddy_monitor_port: 8443
remnawave_caddy_email: ""
remnawave_caddy_tls_mode: public
remnawave_caddy_tls_cert_file: ""
remnawave_caddy_tls_key_file: ""
remnawave_caddy_local_only: true
remnawave_caddy_acme_ca: ""

remnawave_bbr_enabled: true
remnawave_ipv6_state: enabled
remnawave_warp_enabled: false

# Fleet-driven feature flags
feature_base: true
feature_firewall: true
feature_docker: true
feature_remnawave_node: false
feature_caddy_node: false
feature_node_tuning: false
feature_monitoring_agent: false
feature_monitoring_stack: false
feature_user_shell: false
custom_roles: []
ssh_lockdown_enabled: false
fleet_mode: deploy
fleet_hosts: {}

# Monitoring defaults
monitoring_agent_bind_address: "0.0.0.0"
monitoring_agent_node_exporter_port: 9100
monitoring_agent_cadvisor_port: 8080
monitoring_agent_enable_node_exporter: true
monitoring_agent_enable_cadvisor: true
monitoring_agent_manage_runtime: true
monitoring_agent_install_path: /opt/monitoring-agent

monitoring_stack_install_path: /opt/monitoring-stack
monitoring_stack_manage_runtime: true
monitoring_stack_retention_days: 7
monitoring_stack_grafana_admin_user: admin
monitoring_stack_grafana_admin_password: change_me
monitoring_stack_prometheus_port: 9090
monitoring_stack_alertmanager_port: 9093
monitoring_stack_grafana_port: 3000
monitoring_stack_loki_port: 3100
monitoring_stack_scrape_fleet_agents: true
