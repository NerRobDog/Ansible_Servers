---
- name: Validate supported OS for Caddy role
  ansible.builtin.assert:
    that:
      - ansible_os_family == "Debian"
      - ansible_distribution in ["Debian", "Ubuntu"]
    fail_msg: "Role caddy_node supports Debian/Ubuntu only."
  tags: [remnawave, caddy]

- name: Resolve effective Caddy variables
  ansible.builtin.set_fact:
    remnawave_caddy_domain_effective: "{{ remnawave_caddy_domain_resolved | default(remnawave_caddy_domain, true) | string }}"
    remnawave_caddy_monitor_port_effective: "{{ remnawave_caddy_monitor_port_resolved | default(remnawave_caddy_monitor_port, true) | int }}"
    remnawave_caddy_email_effective: "{{ remnawave_caddy_email_resolved | default(remnawave_caddy_email, true) | string }}"
    remnawave_caddy_tls_mode_effective: "{{ remnawave_caddy_tls_mode_resolved | default(remnawave_caddy_tls_mode, true) | string | lower }}"
    remnawave_caddy_tls_cert_file_effective: "{{ remnawave_caddy_tls_cert_file_resolved | default(remnawave_caddy_tls_cert_file, true) | string }}"
    remnawave_caddy_tls_key_file_effective: "{{ remnawave_caddy_tls_key_file_resolved | default(remnawave_caddy_tls_key_file, true) | string }}"
    remnawave_caddy_local_only_effective: "{{ remnawave_caddy_local_only_resolved | default(remnawave_caddy_local_only, true) | bool }}"
    remnawave_caddy_acme_ca_effective: "{{ remnawave_caddy_acme_ca_resolved | default(remnawave_caddy_acme_ca, true) | string }}"
    remnawave_node_port_effective: "{{ remnawave_node_port_resolved | default(remnawave_node_port, true) | int }}"
    remnawave_panel_allowed_sources_effective: >-
      {{ remnawave_panel_allowed_sources_resolved | default(remnawave_panel_allowed_sources, true) }}
  changed_when: false
  tags: [remnawave, caddy]

- name: Validate required Caddy vars
  ansible.builtin.assert:
    that:
      - remnawave_caddy_domain_effective | trim | length > 0
      - (remnawave_caddy_monitor_port_effective | int) > 0
      - (remnawave_caddy_monitor_port_effective | int) < 65536
      - (remnawave_caddy_monitor_port_effective | int) != 443
      - remnawave_caddy_tls_mode_effective in ["public", "internal", "files"]
      - remnawave_caddy_tls_mode_effective != "files" or (remnawave_caddy_tls_cert_file_effective | trim | length > 0)
      - remnawave_caddy_tls_mode_effective != "files" or (remnawave_caddy_tls_key_file_effective | trim | length > 0)
    fail_msg: >-
      Invalid Caddy config. Ensure domain is set, monitor port is valid and not 443,
      tls_mode is one of public|internal|files, and files mode has cert/key paths.
  tags: [remnawave, caddy]

- name: Validate Caddy public domain has DNS record
  ansible.builtin.command:
    cmd: "getent ahosts {{ remnawave_caddy_domain_effective }}"
  register: remnawave_caddy_domain_dns
  changed_when: false
  failed_when: remnawave_caddy_domain_dns.rc != 0
  when: remnawave_caddy_tls_mode_effective == "public"
  tags: [remnawave, caddy]

- name: Validate panel allowed sources format
  ansible.builtin.assert:
    that:
      - remnawave_panel_allowed_sources_effective is iterable
      - remnawave_panel_allowed_sources_effective is not string
      - >-
        (
          remnawave_panel_allowed_sources_effective
          | map('string')
          | select('match', '^[0-9a-fA-F:.]+\\/([0-9]|[12][0-9]|3[0-2]|1[01][0-9]|12[0-8])$')
          | list
          | length
        ) == (remnawave_panel_allowed_sources_effective | length)
    fail_msg: "remnawave.panel_allowed_sources must be a list of IPv4/IPv6 CIDRs."
  tags: [remnawave, caddy]

- name: Install Caddy prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  tags: [remnawave, caddy]

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags: [remnawave, caddy]

- name: Download Caddy apt GPG key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /etc/apt/keyrings/caddy-stable.asc
    owner: root
    group: root
    mode: "0644"
    force: false
  tags: [remnawave, caddy]

- name: Resolve Caddy apt architecture
  ansible.builtin.set_fact:
    remnawave_caddy_apt_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64', 'armv7l': 'armhf'}.get(ansible_architecture, ansible_architecture) }}"
  changed_when: false
  tags: [remnawave, caddy]

- name: Configure Caddy apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/caddy-stable.asc arch={{ remnawave_caddy_apt_arch }}]
      https://dl.cloudsmith.io/public/caddy/stable/deb/{{ ansible_distribution | lower }}
      any-version main
    filename: caddy-stable
    state: present
  tags: [remnawave, caddy]

- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: present
    update_cache: true
  tags: [remnawave, caddy]

- name: Render Caddyfile for RemaWave self-steal decoy
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
    validate: "caddy validate --config %s --adapter caddyfile"
  notify: Restart caddy
  tags: [remnawave, caddy]

- name: Ensure Caddy service is enabled and running
  ansible.builtin.service:
    name: caddy
    state: started
    enabled: true
  tags: [remnawave, caddy]
