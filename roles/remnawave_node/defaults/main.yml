---
remnawave_node_image: remnawave/node:latest
remnawave_node_port: 3001
remnawave_node_secret_key: ""
remnawave_node_install_path: /opt/remnanode
remnawave_node_log_dir: /var/log/remnanode
remnawave_node_network_mode: host
remnawave_node_cap_add:
  - NET_ADMIN
remnawave_node_manage_runtime: true
remnawave_node_compose_pull: missing
remnawave_node_compose_remove_orphans: true

remnawave_api_enabled: true
remnawave_api_endpoint_template: ""
remnawave_fallback_json_env: RW_NODE_FALLBACK_JSON
remnawave_runtime_host_vars: {}
