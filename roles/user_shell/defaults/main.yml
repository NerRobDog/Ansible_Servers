---
create_user: false
configure_root_zsh: true

new_user: ""
new_user_comment: ""
new_user_home: ""
new_user_groups:
  - wheel
  - docker
new_user_password_hash: null
new_user_authorized_keys: []
new_user_authorized_keys_exclusive: true
new_user_passwordless_sudo: false
new_user_shell: /bin/bash
new_user_home_resolved: "{{ new_user_home | default((new_user == 'root') | ternary('/root', '/home/' ~ new_user), true) }}"

zsh_theme: afowler
omz_plugins:
  - git
  - history
  - zsh-autosuggestions
  - zsh-syntax-highlighting
  - dirhistory
  - web-search
  - docker
  - extract
  - docker-compose
  - z
  - fzf
  - colored-man-pages
  - aliases
  - ansible
zsh_custom_plugins:
  - name: zsh-autosuggestions
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    version: master
  - name: zsh-syntax-highlighting
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    version: master
enable_thefuck: false

pipx_packages: []
pipx_packages_effective: "{{ (pipx_packages | reject('equalto', 'thefuck') | list) + ((enable_thefuck | bool) | ternary(['thefuck'], [])) }}"
omz_plugins_effective: "{{ (omz_plugins + ((enable_thefuck | bool) | ternary(['thefuck'], []))) | unique }}"
