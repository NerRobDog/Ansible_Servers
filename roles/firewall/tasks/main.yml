---
- name: Validate supported OS for firewall role
  ansible.builtin.assert:
    that:
      - ansible_os_family == "Debian"
    fail_msg: "Role firewall supports Debian/Ubuntu only."

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Set UFW default incoming policy
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set UFW default outgoing policy
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ firewall_ssh_port | string }}"
    proto: tcp

- name: Allow required public TCP ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item | string }}"
    proto: tcp
  loop: "{{ firewall_public_tcp_ports }}"

- name: Allow extra TCP ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item | string }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"

- name: Allow extra UDP ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item | string }}"
    proto: udp
  loop: "{{ firewall_allowed_udp_ports }}"

- name: Remove public allow rule for Caddy monitor port when disabled
  community.general.ufw:
    rule: allow
    port: "{{ firewall_caddy_monitor_port | string }}"
    proto: tcp
    delete: true
  when: not (firewall_open_caddy_monitor_port | bool)

- name: Allow Caddy monitor port publicly when explicitly enabled
  community.general.ufw:
    rule: allow
    port: "{{ firewall_caddy_monitor_port | string }}"
    proto: tcp
  when: firewall_open_caddy_monitor_port | bool

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: firewall_enabled | bool
