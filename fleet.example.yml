---
# Fleet config template for RW_FLEET_CONFIG_B64 (GitHub Environment Secret).
# This YAML is designed for multi-server usage:
# 1) Put common settings into defaults
# 2) In each host block set only differences
# 3) Add new servers by copying one host block
#
# Then base64-encode and save into GitHub Environment Secret RW_FLEET_CONFIG_B64.

defaults:
  ansible_port: 22
  deploy_user: deploy
  bootstrap:
    username: root
    password: "CHANGE_ME"
  features:
    feature_base: true
    feature_firewall: true
    feature_docker: true
    feature_remnawave_node: true
    feature_caddy_node: true
    feature_node_tuning: true
    feature_monitoring_agent: false
    feature_monitoring_stack: false
    feature_user_shell: true
  remnawave:
    # Empty = auto:
    # target_profile_name -> <host_alias>
    # inbound_tag -> VLESS_<HOST_ALIAS>
    # target_inbound_tags -> [inbound_tag]
    # reality_server_name -> caddy_domain
    # reality_short_id/reality_private_key -> deterministic generation
    node_secret_key: ""
    node_port: 3001
    caddy_domain: ""
    caddy_monitor_port: 8443
    ipv6_state: enabled
    caddy_tls_mode: public
    caddy_local_only: true
    caddy_tls_cert_file: ""
    caddy_tls_key_file: ""
    caddy_acme_ca: ""
    # panel_node_uuid: "00000000-0000-4000-8000-000000000001"
    # target_profile_name: "fra_node_1"
    # inbound_tag: "VLESS_FRA_NODE_1"
    # target_inbound_tags:
    #   - "VLESS_FRA_NODE_1"
    reality_target: "127.0.0.1:8443"
    # reality_short_id: "7642b35f5570246f"
    # reality_private_key: "REPLACE_ME"
    # reality_server_name: "node1.example.com"
    # panel_allowed_sources:
    #   - "89.23.98.20/32"
  firewall:
    ssh_allowed_sources:
      - "0.0.0.0/0"
      - "::/0"
    extra_allowed_tcp_ports: []
    extra_allowed_udp_ports: []
  custom_roles: []
  monitoring:
    agent_bind_address: "0.0.0.0"
    agent_node_exporter_port: 9100
    agent_cadvisor_port: 8080
    agent_promtail_enabled: true
    agent_acl_enabled: false
    agent_acl_allowed_sources: []
    loki_push_url: ""
    labels:
      country: ""
      role: node
    stack_bind_address: "127.0.0.1"
    stack_loki_ingest_bind_address: "0.0.0.0"
    stack_loki_ingest_allowed_sources: []
    stack_retention_days: 7
    stack_grafana_admin_user: admin
    stack_grafana_admin_password: "CHANGE_ME_GRAFANA_ADMIN_PASSWORD"

hosts:
  # Node server: full stack from defaults
  fra_node_1:
    ansible_host: 203.0.113.10
    bootstrap:
      username: root
      password: "CHANGE_ME_FRA_1"
    features:
      feature_remnawave_node: true
      feature_monitoring_agent: false
    remnawave:
      node_secret_key: "CHANGE_ME_NODE_SECRET_FRA_1"
      node_port: 3001
      caddy_domain: "node1.example.com"
      caddy_monitor_port: 8443
      ipv6_state: enabled
      caddy_tls_mode: public
      caddy_local_only: true
      # Optional: if empty, node name must match host alias (fra_node_1).
      # panel_node_uuid: "00000000-0000-4000-8000-000000000001"
      reality_target: "127.0.0.1:8443"
      # Optional (auto by host alias). Uncomment if you need explicit values:
      # target_profile_name: "fra_node_1"
      # inbound_tag: "VLESS_FRA_NODE_1"
      # target_inbound_tags:
      #   - "VLESS_FRA_NODE_1"
      # reality_server_name: "node1.example.com"
      # reality_short_id: "7642b35f5570246f"
      # reality_private_key: "REPLACE_ME"
      # panel_allowed_sources:
      #   - "89.23.98.20/32"
    custom_roles: []
    monitoring:
      agent_bind_address: "0.0.0.0"
      agent_node_exporter_port: 9100
      agent_cadvisor_port: 8080
      agent_promtail_enabled: true
      labels:
        country: DE
        role: node
      agent_acl_enabled: false
      agent_acl_allowed_sources: []

  # Node server with host-specific overrides
  fra_node_2:
    ansible_host: 203.0.113.11
    bootstrap:
      username: root
      password: "CHANGE_ME_FRA_2"
    remnawave:
      node_secret_key: "CHANGE_ME_NODE_SECRET_FRA_2"
      node_port: 3002
      caddy_domain: "node2.example.com"
      caddy_monitor_port: 8443
      ipv6_state: enabled
      caddy_tls_mode: public
      caddy_local_only: true
      # Optional: if empty, node name must match host alias (fra_node_2).
      # panel_node_uuid: "00000000-0000-4000-8000-000000000002"
      reality_target: "127.0.0.1:8443"
      # Optional (auto by host alias). Uncomment if you need explicit values:
      # target_profile_name: "fra_node_2"
      # inbound_tag: "VLESS_FRA_NODE_2"
      # target_inbound_tags:
      #   - "VLESS_FRA_NODE_2"
      # reality_server_name: "node2.example.com"
      # reality_short_id: "c0d2ed6aa8460e20"
      # reality_private_key: "REPLACE_ME"
      # panel_allowed_sources:
      #   - "89.23.98.20/32"
    custom_roles: []
    monitoring:
      agent_bind_address: "0.0.0.0"
      agent_node_exporter_port: 9100
      agent_cadvisor_port: 8080
      agent_promtail_enabled: true
      labels:
        country: DE
        role: node
      # Разрешить scrape только с конкретных IP:
      # agent_acl_enabled: true
      # agent_acl_allowed_sources:
      #   - "203.0.113.10/32"

  # Non-node sandbox server with selective features
  test_sandbox_1:
    ansible_host: 203.0.113.20
    bootstrap:
      username: ubuntu
      password: "CHANGE_ME_SANDBOX"
    features:
      feature_remnawave_node: false
      feature_caddy_node: false
      feature_node_tuning: false
      feature_monitoring_agent: false
      feature_monitoring_stack: false
      feature_user_shell: true
    remnawave:
      # Optional (normally not needed for non-node host):
      # panel_node_uuid: "00000000-0000-4000-8000-000000000099"
      # target_profile_name: "test_sandbox_1"
      # target_inbound_tags:
      #   - VLESS_TEST_SANDBOX_1
    # Example of local role in roles/<name>
    custom_roles:
      - user_shell
      # - my_test_stack

# Tips:
# - Для включения monitoring_agent обязательно добавьте ровно один host с feature_monitoring_stack=true.
# - If all servers share same bootstrap username, keep it only in defaults.bootstrap.username.
# - Set per-host bootstrap.password even when username is inherited.
# - In deploy/lockdown mode bootstrap.password is not used, but may stay in secret config.
