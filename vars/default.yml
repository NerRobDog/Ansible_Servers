---
zsh_theme: afowler
configure_root_zsh: true

omz_plugins:
  - git
  - history
  - zsh-autosuggestions
  - zsh-syntax-highlighting
  - dirhistory
  - web-search
  - docker
  - extract
  - docker-compose
  - z
  - fzf
  - thefuck
  - colored-man-pages
  - aliases
  - ansible
base_packages:
  - git
  - curl
  - wget
  - nano
  - zsh
  - fzf
  - unzip
  - python3
  - python3-pip
  - rsync
  - sshpass
  - ansible-core
  - htop
  - net-tools
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
pip_packages:
  - thefuck
  - httpie
pipx_packages:
  - thefuck
# будут скачаны из репозиториев
zsh_custom_plugins:
  - name: zsh-autosuggestions
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    version: master

  - name: zsh-syntax-highlighting
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    version: master

enable_thefuck: false