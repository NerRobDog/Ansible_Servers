---
# Two-server fleet template: Germany + Netherlands.
# Stack: base + docker + remnawave_node + caddy_node + node_tuning + user_shell.
#
# Usage:
# 1) Fill placeholders below.
# 2) Base64-encode this YAML.
# 3) Save encoded string into GitHub Environment Secret RW_FLEET_CONFIG_B64.

defaults:
  ansible_port: 22
  deploy_user: deploy
  bootstrap:
    username: root
    password: "CHANGE_ME"
  features:
    feature_base: true
    feature_firewall: true
    feature_docker: true
    feature_remnawave_node: true
    feature_caddy_node: true
    feature_node_tuning: true
    feature_user_shell: true
  remnawave:
    # Empty = auto:
    # target_profile_name -> <host_alias>
    # inbound_tag -> VLESS_<HOST_ALIAS>
    # target_inbound_tags -> [inbound_tag]
    # reality_server_name -> caddy_domain
    # reality_short_id/reality_private_key -> deterministic generation
    node_secret_key: ""
    node_port: 3001
    caddy_domain: ""
    caddy_monitor_port: 8443
    ipv6_state: enabled
    caddy_tls_mode: public
    caddy_local_only: true
    caddy_tls_cert_file: ""
    caddy_tls_key_file: ""
    caddy_acme_ca: ""
    # panel_node_uuid: "00000000-0000-4000-8000-000000000001"
    # target_profile_name: "de_node"
    # inbound_tag: "VLESS_DE_NODE"
    # target_inbound_tags:
    #   - "VLESS_DE_NODE"
    reality_target: "127.0.0.1:8443"
    # reality_short_id: "c0d2ed6aa8460e20"
    # reality_private_key: "REPLACE_ME"
    # reality_server_name: "de-node.example.com"
  custom_roles: []

hosts:
  de_node:
    ansible_host: "GERMANY_PUBLIC_IP"
    bootstrap:
      username: root
      password: "GERMANY_SERVER_PASSWORD"
    remnawave:
      node_secret_key: "GERMANY_REMNAWAVE_NODE_SECRET"
      node_port: 3001
      caddy_domain: "de-node.example.com"
      caddy_monitor_port: 8443
      ipv6_state: enabled
      caddy_tls_mode: public
      caddy_local_only: true
      # Optional: if empty, node name must match host alias (de_node).
      # panel_node_uuid: "GERMANY_PANEL_NODE_UUID"
      reality_target: "127.0.0.1:8443"
      # Optional (auto by host alias). Uncomment if you need explicit values:
      # target_profile_name: "de_node"
      # inbound_tag: "VLESS_DE_NODE"
      # target_inbound_tags:
      #   - "VLESS_DE_NODE"
      # reality_server_name: "de-node.example.com"
      # reality_short_id: "7642b35f5570246f"
      # reality_private_key: "REPLACE_ME"
    custom_roles: []

  nl_node:
    ansible_host: "NETHERLANDS_PUBLIC_IP"
    bootstrap:
      username: root
      password: "NETHERLANDS_SERVER_PASSWORD"
    remnawave:
      node_secret_key: "NETHERLANDS_REMNAWAVE_NODE_SECRET"
      node_port: 3001
      caddy_domain: "nl-node.example.com"
      caddy_monitor_port: 8443
      ipv6_state: enabled
      caddy_tls_mode: public
      caddy_local_only: true
      # Optional: if empty, node name must match host alias (nl_node).
      # panel_node_uuid: "NETHERLANDS_PANEL_NODE_UUID"
      reality_target: "127.0.0.1:8443"
      # Optional (auto by host alias). Uncomment if you need explicit values:
      # target_profile_name: "nl_node"
      # inbound_tag: "VLESS_NL_NODE"
      # target_inbound_tags:
      #   - "VLESS_NL_NODE"
      # reality_server_name: "nl-node.example.com"
      # reality_short_id: "c0d2ed6aa8460e20"
      # reality_private_key: "REPLACE_ME"
    custom_roles: []
